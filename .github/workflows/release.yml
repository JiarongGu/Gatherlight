name: Release

# Manual-trigger only. There is intentionally NO auto CI on push/PR and NO tag-push trigger — cutting
# a release is a deliberate act you start from the Actions tab (Run workflow). Mirrors the sibling
# D3dxSkinManager release model. The full e2e suite still gates every release below.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0) — leave empty to bump from the current version'
        required: false
        type: string
      bump:
        description: 'Version bump type (ignored when an explicit version is given)'
        required: false
        type: choice
        default: 'patch'
        options:
          - none
          - patch
          - minor
          - major
      create_tag:
        description: 'Create + push a git tag for this version'
        required: false
        type: boolean
        default: true
      draft:
        description: 'Create the GitHub release as a draft (review before publishing)'
        required: false
        type: boolean
        default: true
      prerelease:
        description: 'Mark as a pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # create releases + tags, push the version-bump commit

jobs:
  package:
    name: Build bundle + release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history for release notes + tag diffs

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/client/package-lock.json

      - name: Setup MSBuild (native launcher)
        uses: microsoft/setup-msbuild@v2

      # Version source of truth = src/Directory.Build.props (<VersionPrefix>), which the .NET assemblies
      # AND devtools/project.config.mjs both read. An explicit `version` input wins; otherwise `bump`
      # steps the current semver. A changed version is written back + committed so the repo, the bundle,
      # and the tag all agree.
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $current = node -e "import('./devtools/project.config.mjs').then(m=>process.stdout.write(String(m.default.version)))"
          Write-Host "current version: $current"

          $final = $current
          if ("${{ inputs.version }}" -ne "") {
            $final = "${{ inputs.version }}"
            Write-Host "explicit version: $final"
          } elseif ("${{ inputs.bump }}" -ne "none") {
            if ($current -match '^(\d+)\.(\d+)\.(\d+)') {
              $maj = [int]$matches[1]; $min = [int]$matches[2]; $pat = [int]$matches[3]
              switch ("${{ inputs.bump }}") {
                "major" { $maj++; $min = 0; $pat = 0 }
                "minor" { $min++; $pat = 0 }
                "patch" { $pat++ }
              }
              $final = "$maj.$min.$pat"
              Write-Host "bumped ${{ inputs.bump }}: $current -> $final"
            } else {
              Write-Host "::error::version '$current' is not X.Y.Z — pass an explicit version input"
              exit 1
            }
          }

          if ($final -ne $current) {
            $p = "src/Directory.Build.props"
            $c = Get-Content $p -Raw
            $c = $c -replace "(<VersionPrefix>)[^<]*(</VersionPrefix>)", ('${1}' + $final + '${2}')
            Set-Content $p $c -NoNewline -Encoding utf8
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add $p
            git commit -m "chore: release v$final"
            git push
          }

          "version=$final" >> $env:GITHUB_OUTPUT
          "tag=v$final" >> $env:GITHUB_OUTPUT

      - name: Install client deps
        working-directory: src/client
        run: npm ci

      # Gate the release on the full e2e suite against the exact commit we're about to bundle.
      # --build guarantees a fresh client + server first; a red suite fails the release.
      - name: e2e gate
        run: node devtools/dev.mjs e2e all --build

      # Builds client -> self-contained host -> native C++ launcher -> publish/Gatherlight/ + zip.
      # GitHub Actions sets CI=true, so Gatherlight.Launcher.vcxproj selects the v143 toolset. --zip
      # packages the runnable folder into the shippable .zip. The bundle carries git + the Playwright
      # driver + chromium.
      - name: Build production bundle
        env:
          GATHERLIGHT_VERSION: ${{ steps.version.outputs.version }}
        run: node devtools/scripts/build-production.mjs win-x64 --zip

      - name: Locate artifact
        id: artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem "publish\*.zip" | Select-Object -First 1
          if (-not $zip) { Write-Host "::error::no bundle zip produced"; exit 1 }
          Write-Host "artifact: $($zip.FullName) ($([math]::Round($zip.Length/1MB,1)) MB)"
          "path=$($zip.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gatherlight-win-x64
          path: |
            ${{ steps.artifact.outputs.path }}
            publish/Gatherlight/manifest.json

      # Only tag AFTER a green e2e + a successful bundle, so tags always point at shippable commits.
      - name: Create git tag
        if: inputs.create_tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $prev = git describe --tags --abbrev=0 "$tag^" 2>$null
          if ($prev) { $log = git log "$prev..HEAD" --pretty=format:"- %s" --no-merges }
          else { $log = git log --pretty=format:"- %s" --no-merges }
          $notes = @("## Gatherlight $tag", "", $log, "", "---",
            "Download the zip, extract, and run **Gatherlight.exe**. Windows 10/11 (x64).") -join "`n"
          $notes | Out-File release-notes.md -Encoding utf8
          Write-Host $notes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Gatherlight ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            ${{ steps.artifact.outputs.path }}
            publish/Gatherlight/manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
