name: Release

# Manual-trigger only. There is intentionally NO auto CI on push/PR and NO tag-push trigger — cutting
# a release is a deliberate act you start from the Actions tab (Run workflow). Mirrors the sibling
# D3dxSkinManager release model. The full e2e suite still gates every release below.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0) — leave empty to bump from the current version'
        required: false
        type: string
      bump:
        description: 'Version bump type (ignored when an explicit version is given)'
        required: false
        type: choice
        default: 'patch'
        options:
          - none
          - patch
          - minor
          - major
      create_tag:
        description: 'Create + push a git tag for this version'
        required: false
        type: boolean
        default: true
      draft:
        description: 'Create the GitHub release as a draft (review before publishing)'
        required: false
        type: boolean
        default: true
      prerelease:
        description: 'Mark as a pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # create releases + tags, push the version-bump commit

jobs:
  package:
    name: Build bundle + release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history for release notes + tag diffs

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/client/package-lock.json

      - name: Setup MSBuild (native launcher)
        uses: microsoft/setup-msbuild@v2

      # Version source of truth = src/Directory.Build.props (<VersionPrefix>), which the .NET assemblies
      # AND devtools/project.config.mjs both read. An explicit `version` input wins; otherwise `bump`
      # steps the current semver. The bump is WRITTEN to the working tree here (so the e2e + bundle use
      # it) but the commit+push is deferred until AFTER the gate passes — a failed release must not leave
      # a phantom bump commit on the branch.
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $current = node -e "import('./devtools/project.config.mjs').then(m=>process.stdout.write(String(m.default.version)))"
          Write-Host "current version: $current"

          $final = $current
          if ("${{ inputs.version }}" -ne "") {
            $final = "${{ inputs.version }}"
            Write-Host "explicit version: $final"
          } elseif ("${{ inputs.bump }}" -ne "none") {
            if ($current -match '^(\d+)\.(\d+)\.(\d+)') {
              $maj = [int]$matches[1]; $min = [int]$matches[2]; $pat = [int]$matches[3]
              switch ("${{ inputs.bump }}") {
                "major" { $maj++; $min = 0; $pat = 0 }
                "minor" { $min++; $pat = 0 }
                "patch" { $pat++ }
              }
              $final = "$maj.$min.$pat"
              Write-Host "bumped ${{ inputs.bump }}: $current -> $final"
            } else {
              Write-Host "::error::version '$current' is not X.Y.Z — pass an explicit version input"
              exit 1
            }
          }

          # Normalize to a full 3-part semver so `1.0` becomes `1.0.0` in the tag, zip name, and bump.
          if ($final -match '^(\d+)(\.(\d+))?(\.(\d+))?([-+].*)?$') {
            $final = "$([int]$matches[1]).$([int]($matches[3] ?? 0)).$([int]($matches[5] ?? 0))" + $matches[6]
            Write-Host "normalized version: $final"
          }

          $changed = "false"
          if ($final -ne $current) {
            $p = "src/Directory.Build.props"
            $c = Get-Content $p -Raw
            $c = $c -replace "(<VersionPrefix>)[^<]*(</VersionPrefix>)", ('${1}' + $final + '${2}')
            Set-Content $p $c -NoNewline -Encoding utf8
            $changed = "true"
            Write-Host "wrote version $final to $p (commit deferred until the gate + bundle pass)"
          }

          "changed=$changed" >> $env:GITHUB_OUTPUT
          "version=$final" >> $env:GITHUB_OUTPUT
          "tag=v$final" >> $env:GITHUB_OUTPUT

      - name: Install client deps
        working-directory: src/client
        run: npm ci

      # The pdf-form Node leaf backs the pdf_fill / fill_itinerary tools (and e2e-p10's fixtures), so
      # install its deps for the gate. (The scraper suites p11/p12 need chromium — download-at-setup,
      # not in the bundle — so they skip gracefully in CI; run them locally after `dev.mjs fetch-tools`.)
      - name: Install pdf-form deps (for e2e-p10)
        working-directory: tools/pdf-form
        run: npm ci

      # Gate the release on the full e2e suite against the exact commit we're about to bundle.
      # --build guarantees a fresh client + server first; a red suite fails the release.
      - name: e2e gate
        run: node devtools/dev.mjs e2e all --build

      # Builds client -> self-contained host -> native C++ launcher -> publish/Gatherlight/ + zip.
      # GitHub Actions sets CI=true, so Gatherlight.Launcher.vcxproj selects the v143 toolset. --zip
      # packages the runnable folder into the shippable .zip. The bundle carries git + the Playwright
      # driver + chromium.
      - name: Build production bundle
        env:
          GATHERLIGHT_VERSION: ${{ steps.version.outputs.version }}
        run: node devtools/scripts/build-production.mjs win-x64 --zip

      - name: Locate artifact
        id: artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem "publish\*.zip" | Select-Object -First 1
          if (-not $zip) { Write-Host "::error::no bundle zip produced"; exit 1 }
          Write-Host "artifact: $($zip.FullName) ($([math]::Round($zip.Length/1MB,1)) MB)"
          "path=$($zip.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gatherlight-win-x64
          path: |
            ${{ steps.artifact.outputs.path }}
            publish/Gatherlight/manifest.json

      # Commit + push the version bump ONLY now that e2e + the bundle succeeded — so a failed release
      # leaves no phantom "chore: release vX" commit on the branch (and never burns a version number).
      - name: Commit version bump
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/Directory.Build.props
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git push

      # Only tag AFTER a green e2e + a successful bundle (+ the bump commit), so tags always point at
      # shippable commits.
      - name: Create git tag
        if: inputs.create_tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          $currentTag = "${{ steps.version.outputs.tag }}"

          # Previous RELEASE tag = the highest tag STRICTLY LESS than the current version, compared by
          # VERSION (not `git describe`, which is empty on a first release → dumped ALL history, and not
          # a string sort). Robust when the current tag already exists (a re-run) and orders 1.10.0 >
          # 1.6.0 numerically; handles 2- or 3-part tags (an old `v1.0` parses as 1.0.0).
          function Parse-Ver($t) {
            if ($t -match '^v?(\d+)\.(\d+)(\.(\d+))?') {
              $patch = if ($matches[4]) { $matches[4] } else { '0' }
              return [version]"$($matches[1]).$($matches[2]).$patch"
            }
            return $null
          }
          $curV = Parse-Ver $currentTag
          $previousTag = $null; $prevV = $null
          foreach ($t in (git tag)) {
            $v = Parse-Ver $t
            if ($null -eq $v) { continue }
            if ($curV -and $v -ge $curV) { continue }   # skip the current tag + anything newer
            if ($null -eq $prevV -or $v -gt $prevV) { $prevV = $v; $previousTag = $t }
          }

          if ($previousTag) {
            Write-Host "notes: $previousTag..HEAD (current $currentTag)"
            $commits = git log "$previousTag..HEAD" --pretty=format:"%s" --no-merges
          } else {
            Write-Host "no previous release tag — using all commits"
            $commits = git log --pretty=format:"%s" --no-merges
          }

          # Categorize by conventional-commit prefix (scoped too, e.g. `fix(backup):`); drop the
          # non-user-facing kinds so the notes read like a changelog, not a raw git log.
          $features = @(); $fixes = @(); $other = @()
          foreach ($msg in $commits) {
            if ($msg -match '^feat(\([^)]+\))?:\s*(.+)')    { $features += $matches[2].Trim() }
            elseif ($msg -match '^fix(\([^)]+\))?:\s*(.+)') { $fixes += $matches[2].Trim() }
            elseif ($msg -match '^(chore|docs|refactor|style|perf|test|ci|build)(\([^)]+\))?:\s*') { }
            else { $other += $msg }
          }

          $notes = @("## Gatherlight $currentTag", "")
          if ($features.Count) { $notes += "### New features"; $notes += ""; $features | ForEach-Object { $notes += "- $_" }; $notes += "" }
          if ($fixes.Count)    { $notes += "### Fixes";        $notes += ""; $fixes    | ForEach-Object { $notes += "- $_" }; $notes += "" }
          if ($other.Count)    { $notes += "### Other changes"; $notes += ""; $other   | ForEach-Object { $notes += "- $_" }; $notes += "" }
          if (($features.Count + $fixes.Count + $other.Count) -eq 0) { $notes += "No notable changes."; $notes += "" }

          $notes += "---"; $notes += ""
          $notes += "Download the zip, extract, and run **Gatherlight.exe**. On first run the launcher installs the .NET 10 runtime if it's missing (one-time). Windows 10/11 (x64)."

          $md = $notes -join "`n"
          $md | Out-File release-notes.md -Encoding utf8
          Write-Host $md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Gatherlight ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            ${{ steps.artifact.outputs.path }}
            publish/Gatherlight/manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
